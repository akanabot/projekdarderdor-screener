name: Run IHSG Screener

on:
  schedule:
    - cron: '30 7 * * 1-5'   # 14:30 WIB (Senin–Jumat)
    - cron: '0 8 * * 1-5'    # 15:00 WIB
    - cron: '30 8 * * 1-5'   # 15:30 WIB
  workflow_dispatch:           # trigger manual via GitHub UI

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    # Wajib ditambahkan agar bot diizinkan menyimpan file result.json ke repo Anda
    permissions:
      contents: write 

    # ... (bagian atas name, schedule, jobs tetap sama)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install yfinance pandas pandas-ta pytz

      - name: Run screener
        run: python screener/screen.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Gunakan path yang lebih luas untuk memastikan file terdeteksi
          git add data/*.json || echo "No data file found"
          
          # Hanya commit jika ada perubahan (mencegah error jika data sama)
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update screener result $(date +'%Y-%m-%d %H:%M WIB')"
            git push
          fi
